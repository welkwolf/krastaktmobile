<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Проверка обновлений | Крастакт</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            background: linear-gradient(135deg, #1a1a1a 0%, #2d2d2d 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .update-card {
            background: #252525;
			display: none;
            border-radius: 32px;
            padding: 48px 40px;
            text-align: center;
            max-width: 450px;
            width: 100%;
            border: 1px solid #3a3a3a;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5);
        }

        .update-icon {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, #dc2626 0%, #b91c1c 100%);
            border-radius: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 24px;
        }

        .update-icon i {
            font-size: 3rem;
            color: white;
        }

        h1 {
            color: white;
            font-size: 1.8rem;
            margin-bottom: 8px;
        }

        .subtitle {
            color: #adb5bd;
            margin-bottom: 32px;
            font-size: 0.9rem;
        }

        .version-info {
            background: #1a1a1a;
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 24px;
        }

        .version-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 0;
            border-bottom: 1px solid #3a3a3a;
        }

        .version-row:last-child {
            border-bottom: none;
        }

        .version-label {
            color: #adb5bd;
            font-weight: 500;
        }

        .version-value {
            color: white;
            font-weight: 700;
            font-size: 1.1rem;
        }

        .version-value.latest {
            color: #4ade80;
        }

        .version-value.old {
            color: #f87171;
        }

        .status {
            padding: 16px;
            border-radius: 16px;
            margin-bottom: 24px;
            font-weight: 500;
        }

        .status.loading {
            background: rgba(59, 130, 246, 0.2);
            color: #60a5fa;
        }

        .status.update {
            background: rgba(220, 38, 38, 0.2);
            color: #f87171;
        }

        .status.latest {
            background: rgba(34, 197, 94, 0.2);
            color: #4ade80;
        }

        .status.error {
            background: rgba(220, 38, 38, 0.3);
            color: #f87171;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid #3a3a3a;
            border-top-color: #dc2626;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 20px auto;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .btn {
            display: inline-block;
            padding: 14px 28px;
            border-radius: 40px;
            text-decoration: none;
            font-weight: 600;
            transition: all 0.2s;
            cursor: pointer;
            border: none;
            font-size: 1rem;
        }

        .btn-primary {
            background: linear-gradient(135deg, #dc2626 0%, #b91c1c 100%);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(220, 38, 38, 0.3);
        }

        .btn-secondary {
            background: transparent;
            color: #adb5bd;
            border: 1px solid #3a3a3a;
        }

        .btn-secondary:hover {
            border-color: #dc2626;
            color: #dc2626;
        }

        .button-group {
            display: flex;
            gap: 12px;
            justify-content: center;
        }

        .footer {
            margin-top: 24px;
            color: #6c757d;
            font-size: 0.75rem;
        }

        @media (max-width: 480px) {
            .update-card {
                padding: 32px 24px;
            }
            .update-icon {
                width: 60px;
                height: 60px;
            }
            .update-icon i {
                font-size: 2rem;
            }
            h1 {
                font-size: 1.5rem;
            }
        }
    </style>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>
    <div class="update-card" id="app">
        <div class="update-icon">
            <i class="fas fa-sync-alt"></i>
        </div>
        <h1>Проверка обновлений</h1>
        <div class="subtitle">Крастакт • Автоматическое обновление</div>
        
        <div id="content">
            <div class="spinner"></div>
            <p style="color: #adb5bd;">Проверка версии...</p>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBX0fnvfVbsfTiuksc2JtebtmaltgAS87U",
            authDomain: "krastakt.firebaseapp.com",
            databaseURL: "https://krastakt-default-rtdb.firebaseio.com",
            projectId: "krastakt",
            storageBucket: "krastakt.firebasestorage.app",
            messagingSenderId: "53885771537",
            appId: "1:53885771537:web:d293118c77625af7c136b0"
        };

        const RTDB_URL = "https://krastakt-default-rtdb.firebaseio.com";

        function getUrlParams() {
            const params = new URLSearchParams(window.location.search);
            return {
                version: params.get('ver')
            };
        }

        async function fetchCurrentVersion() {
            const url = `${RTDB_URL}/current_version.json`;
            
            try {
                const response = await fetch(url);
                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}`);
                }
                const data = await response.json();
                return data;
            } catch (error) {
                console.error("Ошибка загрузки версии:", error);
                return null;
            }
        }

        function compareVersions(current, server) {
            if (!current || !server) return false;
            
            const currentParts = String(current).split('.').map(Number);
            const serverParts = String(server).split('.').map(Number);
            
            for (let i = 0; i < Math.max(currentParts.length, serverParts.length); i++) {
                const currentPart = currentParts[i] || 0;
                const serverPart = serverParts[i] || 0;
                
                if (serverPart > currentPart) return true;
                if (serverPart < currentPart) return false;
            }
            return false;
        }

        function renderContent(currentVersion, serverVersion, needsUpdate, error = null) {
            const contentDiv = document.getElementById('content');
            
            if (error) {
                contentDiv.innerHTML = `
                    <div class="status error">
                        <i class="fas fa-exclamation-triangle"></i> ${error}
                    </div>
                    <div class="button-group">
                        <button class="btn btn-secondary" onclick="window.location.reload()">
                            <i class="fas fa-redo"></i> Повторить
                        </button>
                        <a href="feed.html" class="btn btn-secondary">
                            <i class="fas fa-home"></i> На главную
                        </a>
                    </div>
                `;
                return;
            }
            
            if (needsUpdate) {
                contentDiv.innerHTML = `
                    <div class="version-info">
                        <div class="version-row">
                            <span class="version-label">Ваша версия</span>
                            <span class="version-value old">v${escapeHtml(currentVersion)}</span>
                        </div>
                        <div class="version-row">
                            <span class="version-label">Новая версия</span>
                            <span class="version-value latest">v${escapeHtml(serverVersion)}</span>
                        </div>
                    </div>
                    <div class="status update">
                        <i class="fas fa-download"></i> Доступно обновление!
                    </div>
                    <div class="button-group">
                        <a href="https://krastakt.ru/update.html" class="btn btn-primary">
                            <i class="fas fa-arrow-right"></i> Обновить
                        </a>
                        <button class="btn btn-secondary" onclick="window.location.reload()">
                            <i class="fas fa-redo"></i> Проверить снова
                        </button>
                    </div>
                `;
            } else {
                contentDiv.innerHTML = `
                    <div class="version-info">
                        <div class="version-row">
                            <span class="version-label">Ваша версия</span>
                            <span class="version-value latest">v${escapeHtml(currentVersion)}</span>
                        </div>
                        <div class="version-row">
                            <span class="version-label">Актуальная версия</span>
                            <span class="version-value latest">v${escapeHtml(serverVersion)}</span>
                        </div>
                    </div>
                    <div class="status latest">
                        <i class="fas fa-check-circle"></i> У вас актуальная версия!
                    </div>
                    <div class="button-group">
                        <a href="feed.html" class="btn btn-primary">
                            <i class="fas fa-home"></i> На главную
                        </a>
                        <button class="btn btn-secondary" onclick="window.location.reload()">
                            <i class="fas fa-redo"></i> Проверить снова
                        </button>
                    </div>
                `;
            }
        }

        function escapeHtml(str) {
            if (!str) return '';
            return String(str).replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }

        async function checkUpdate() {
            const { version: currentVersion } = getUrlParams();
            const contentDiv = document.getElementById('content');
            
            if (!currentVersion) {
                contentDiv.innerHTML = `
                    <div class="status error">
                        <i class="fas fa-exclamation-triangle"></i> Не указана версия
                    </div>
                    <div class="version-info">
                        <div class="version-row">
                            <span class="version-label">Пример использования</span>
                            <span class="version-value">checkupd.html?ver=1.0.0</span>
                        </div>
                    </div>
                    <div class="button-group">
                        <a href="feed.html" class="btn btn-secondary">
                            <i class="fas fa-home"></i> На главную
                        </a>
                    </div>
                `;
                return;
            }
            
            contentDiv.innerHTML = `
                <div class="spinner"></div>
                <p style="color: #adb5bd;">Проверка версии ${escapeHtml(currentVersion)}...</p>
            `;
            
            try {
                const serverVersion = await fetchCurrentVersion();
                
                if (serverVersion === null) {
                    renderContent(currentVersion, null, false, "Не удалось получить версию с сервера");
                    return;
                }
                
                const needsUpdate = compareVersions(currentVersion, serverVersion);
                
                if (needsUpdate) {
                    renderContent(currentVersion, serverVersion, true);
                    setTimeout(() => {
                        window.location.href = "https://krastakt.ru/update.html";
                    }, 3000);
                } else {
                    renderContent(currentVersion, serverVersion, false);
                }
                
            } catch (error) {
                console.error("Ошибка:", error);
                renderContent(currentVersion, null, false, "Ошибка подключения к серверу");
            }
        }

        checkUpdate();
    </script>
</body>
</html>
