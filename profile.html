<body>
<div id="app"></div>

<script>
    const firebaseConfig = {
  apiKey: "AIzaSyBX0fnvfVbsfTiuksc2JtebtmaltgAS87U",
  authDomain: "krastakt.firebaseapp.com",
  databaseURL: "https://krastakt-default-rtdb.firebaseio.com",
  projectId: "krastakt",
  storageBucket: "krastakt.firebasestorage.app",
  messagingSenderId: "53885771537",
  appId: "1:53885771537:web:d293118c77625af7c136b0"
};
    

      const cloudinaryConfig = {
        cloudName: "dbjexsgbh",
        uploadPreset: "viagal"  
    };

    let currentUser = null;
    let profileUser = null;
    let posts = {};
    let users = {};
    
    const appDiv = document.getElementById('app');
    
    function getUsernameFromUrl() {
        const params = new URLSearchParams(window.location.search);
        return params.get('id');
    }
    
    
    function getRTDBUrl(path) {
        return `https://krastakt-default-rtdb.firebaseio.com/${path}.json`;
    }
    
    async function fetchUsers() {
        const url = getRTDBUrl('users');
        const response = await fetch(url);
        if (!response.ok) throw new Error("Ошибка загрузки пользователей");
        const data = await response.json();
        return data || {};
    }
    
    async function fetchPosts() {
        const url = getRTDBUrl('posts');
        const response = await fetch(url);
        if (!response.ok) throw new Error("Ошибка загрузки постов");
        const data = await response.json();
        return data || {};
    }
    
    async function updateUser(userId, userData) {
        const url = getRTDBUrl(`users/${userId}`) + `?auth=${currentUser.idToken}`;
        const response = await fetch(url, {
            method: 'PUT',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(userData)
        });
        if (!response.ok) throw new Error("Ошибка обновления");
        return await response.json();
    }
    
    async function updatePostAvatar(postId, avatarUrl) {
        const url = getRTDBUrl(`posts/${postId}/authorAvatar`) + `?auth=${currentUser.idToken}`;
        const response = await fetch(url, {
            method: 'PUT',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(avatarUrl)
        });
        return response.ok;
    }
    
    async function uploadAvatar(file) {
        const formData = new FormData();
        formData.append('file', file);
        formData.append('upload_preset', cloudinaryConfig.uploadPreset);
        
        const url = `https://api.cloudinary.com/v1_1/${cloudinaryConfig.cloudName}/image/upload`;
        const response = await fetch(url, {
            method: 'POST',
            body: formData
        });
        const data = await response.json();
        if (!response.ok) throw new Error(data.error?.message || "Ошибка загрузки");
        return data.secure_url;
    }
    async function ensureUserData(userId, email, displayName) {
    const url = getRTDBUrl(`users/${userId}`);
    const response = await fetch(url);
    
    if (response.status === 404 || !response.ok) {
        const defaultUserData = {
            email: email,
            displayName: displayName,
            username: displayName.toLowerCase(),
            bio: 'no bio..',
            avatar: null,
            followers: {},
            following: {},
            createdAt: Date.now()
        };
        
        const createUrl = getRTDBUrl(`users/${userId}`) + `?auth=${currentUser.idToken}`;
        await fetch(createUrl, {
            method: 'PUT',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(defaultUserData)
        });
        
        return defaultUserData;
    }
    
    const data = await response.json();
    return data;
}
async function loadData() {
    const savedUser = localStorage.getItem('volgura_user') || sessionStorage.getItem('volgura_user');
    if (!savedUser) {
        window.location.href = 'login.html';
        return;
    }
    
    try {
        currentUser = JSON.parse(savedUser);
        
        const [usersData, postsData] = await Promise.all([
            fetchUsers(),
            fetchPosts()
        ]);
        
        users = usersData;
        posts = postsData;
        
        const username = getUsernameFromUrl();
        
        if (!username) {
            const userData = await ensureUserData(
                currentUser.localId,
                currentUser.email,
                currentUser.displayName || currentUser.email.split('@')[0]
            );
            users[currentUser.localId] = userData;
            profileUser = {
                id: currentUser.localId,
                ...userData,
                email: currentUser.email,
                isOwnProfile: true
            };
            renderProfile();
            return;
        }
        
        let foundUser = null;
        let foundUserId = null;
        
        for (const [userId, userData] of Object.entries(users)) {
            if (userData && (userData.username === username || 
                userData.displayName === username ||
                userData.email?.split('@')[0] === username)) {
                foundUser = userData;
                foundUserId = userId;
                break;
            }
        }
        
        if (!foundUser) {
            renderNotFound(username);
            return;
        }
        
        profileUser = {
            id: foundUserId,
            ...foundUser,
            isOwnProfile: foundUserId === currentUser.localId
        };
        
        renderProfile();
    } catch (err) {
        console.error(err);
        renderError("Ошибка загрузки данных");
    }
}
function renderNotFound(username) {
    appDiv.innerHTML = `
        <div class="app-container">
            
            <div class="main-content">
                <div class="profile-container" style="text-align: center; padding: 60px 24px;">
                    <img src="sad.png" style="width: 200px;">

                    <p style="color: #adb5bd; margin-bottom: 30px;">Пользователя по имени "${escapeHtml(username)}" не существует</p>
                    <button class="edit-profile-btn" onclick="window.location.href='feed.html'" style="width: auto; padding: 12px 30px;">
                        Назад в ленту
                    </button>
                </div>
            </div>
        </div>
    `;
}
    
    function openEditModal() {
        const modal = document.getElementById('editModal');
        document.getElementById('editDisplayName').value = profileUser.displayName || '';
        document.getElementById('editBio').value = profileUser.bio || '';
        modal.classList.add('active');
    }
    
    function closeEditModal() {
        const modal = document.getElementById('editModal');
        modal.classList.remove('active');
    }
    
    async function saveProfileChanges() {
        const newDisplayName = document.getElementById('editDisplayName').value.trim();
        const newBio = document.getElementById('editBio').value.trim();
        
        if (!newDisplayName) {
            alert("Имя пользователя не может быть пустым");
            return;
        }
        
        try {
            const updatedUser = {
                ...profileUser,
                displayName: newDisplayName,
                bio: newBio || 'no bio'
            };
            delete updatedUser.isOwnProfile;
            
            await updateUser(profileUser.id, updatedUser);
            
            // Обновляем локальные данные
            profileUser.displayName = newDisplayName;
            profileUser.username = newDisplayName;
            profileUser.bio = newBio;
            
            // Обновляем текущего пользователя
            if (profileUser.isOwnProfile) {
                currentUser.displayName = newDisplayName;
                const savedUser = JSON.parse(localStorage.getItem('volgura_user') || sessionStorage.getItem('volgura_user'));
                savedUser.displayName = newDisplayName;
                if (localStorage.getItem('volgura_user')) {
                    localStorage.setItem('volgura_user', JSON.stringify(savedUser));
                } else {
                    sessionStorage.setItem('volgura_user', JSON.stringify(savedUser));
                }
            }
            
            closeEditModal();
            renderProfile();
        } catch (err) {
            alert("Ошибка сохранения: " + err.message);
        }
    }
    
    async function changeAvatar(event) {
        const file = event.target.files[0];
        if (!file) return;
        
        if (!file.type.startsWith('image/')) {
            alert("Пожалуйста, выберите изображение");
            return;
        }
        
        try {
            const avatarUrl = await uploadAvatar(file);
            const updatedUser = { ...profileUser, avatar: avatarUrl };
            delete updatedUser.isOwnProfile;
            
            await updateUser(profileUser.id, updatedUser);
            profileUser.avatar = avatarUrl;
            
            // Обновляем аватар во всех постах пользователя
            for (const [postId, post] of Object.entries(posts)) {
                if (post.authorId === profileUser.id) {
                    await updatePostAvatar(postId, avatarUrl);
                }
            }
            
            renderProfile();
        } catch (err) {
            alert("Ошибка загрузки аватара: " + err.message);
        }
    }
    
    // ==================== ПОДПИСКИ ====================
    async function toggleFollow() {
        if (!currentUser) {
            alert("Войдите в аккаунт");
            return;
        }
        
        if (currentUser.localId === profileUser.id) {
            alert("Нельзя подписаться на самого себя");
            return;
        }
        
        const currentUserData = users[currentUser.localId] || { 
            email: currentUser.email,
            displayName: currentUser.displayName || currentUser.email.split('@')[0],
            followers: {},
            following: {}
        };
        
        const isFollowing = currentUserData.following && currentUserData.following[profileUser.id];
        
        if (isFollowing) {
            delete currentUserData.following[profileUser.id];
            if (profileUser.followers) {
                delete profileUser.followers[currentUser.localId];
            }
        } else {
            if (!currentUserData.following) currentUserData.following = {};
            currentUserData.following[profileUser.id] = true;
            if (!profileUser.followers) profileUser.followers = {};
            profileUser.followers[currentUser.localId] = true;
        }
        
        try {
            await updateUser(currentUser.localId, currentUserData);
            await updateUser(profileUser.id, profileUser);
            
            // Обновляем локальные данные
            users[currentUser.localId] = currentUserData;
            users[profileUser.id] = profileUser;
            
            renderProfile();
        } catch (err) {
            alert("Ошибка: " + err.message);
        }
    }
    
    function showFollowers() {
        const followersList = document.getElementById('followersList');
        const followers = Object.keys(profileUser.followers || {});
        
        followersList.innerHTML = followers.length === 0 ? 
            '<div class="no-posts">Нет подписчиков</div>' :
            followers.map(followerId => {
                const follower = users[followerId] || {};
                const name = follower.displayName || follower.email?.split('@')[0] || 'Пользователь';
                const avatar = follower.avatar;
                return `

    function showFollowing() {
        const followingList = document.getElementById('followingList');
        const following = Object.keys(profileUser.following || {});
        
        followingList.innerHTML = following.length === 0 ?

    function closeModal(modalId) {
        document.getElementById(modalId).classList.remove('active');
    }
    async function toggleLikeFromProfile(postId) {
    if (!currentUser) {

        window.location.href = 'login.html';
        return;
    }
    
    const post = posts[postId];
    if (!post) return;
    
    const userId = currentUser.localId;
    const likes = post.likes || {};
    
    if (likes[userId]) {
        delete likes[userId];
    } else {
        likes[userId] = true;
    }
    
    try {
        await updatePostInRTDB(postId, { likes: likes });
        posts[postId].likes = likes;
        renderProfile();
    } catch (err) {
        alert("Ошибка: " + err.message);
    }
}
async function updatePostInRTDB(postId, updates) {
    if (!currentUser) throw new Error("Не авторизован");
    const url = getRTDBUrl(`posts/${postId}`) + `?auth=${currentUser.idToken}`;
    const response = await fetch(url, {
        method: 'PATCH',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(updates)
    });
    if (!response.ok) throw new Error("Ошибка обновления");
    return await response.json();
}

async function deletePostFromProfile(postId) {
    if (!currentUser) {
        window.location.href = 'login.html';
        return;
    }
    
    const post = posts[postId];
    if (!post) return;
    
    if (currentUser.localId !== post.authorId) {
        alert("Вы можете удалять только свои посты!");
        return;
    }
    
    if (confirm("Удалить пост?")) {
        try {
            const url = getRTDBUrl(`posts/${postId}`) + `?auth=${currentUser.idToken}`;
            await fetch(url, { method: 'DELETE' });
            
            // Удаляем пост из локального кэша
            delete posts[postId];
            
            // Перерисовываем профиль
            renderProfile();
        } catch (err) {
            alert("Ошибка: " + err.message);
        }
    }
}

async function isVerifiedUser(userId) {
    if (!userId) return false;
    
    const url = `https://krastakt-default-rtdb.firebaseio.com/verifiedUsers/${userId}.json`;
    
    try {
        const response = await fetch(url);
        if (!response.ok) return false;
        const data = await response.json();
        return data === true;
    } catch (err) {
        console.error("Ошибка при проверке наличия галочки:", err);
        return false;
    }
}

    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }
