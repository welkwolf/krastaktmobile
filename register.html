<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=yes">
    <title>Регистрация в Крастакте</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
    font-family: 'Inter', sans-serif;
    background: #2d2d2d;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
}

        .register-page {
            width: 100%;
            max-width: 480px;
            margin: 0 auto;
        }

        .register-card {
            background: #252525;
            border-radius: 32px;
            padding: 40px 32px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            animation: fadeInUp 0.5s ease-out;
            border: 1px solid #3a3a3a;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .logo {
            text-align: center;
            margin-bottom: 32px;
        }
        .logo-icon {
            width: 70px;
            height: 70px;
            background: linear-gradient(135deg, #dc2626 0%, #b91c1c 100%);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 16px;
        }
        .logo-icon i {
            font-size: 2.5rem;
            color: white;
        }
        .logo h1 {
            font-size: 1.8rem;
            font-weight: 800;
            background: linear-gradient(135deg, #dc2626 0%, #b91c1c 100%);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .logo p {
            color: #adb5bd;
            font-size: 0.9rem;
            margin-top: 8px;
        }

        .form-group {
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            color: #e9ecef;
            font-size: 0.9rem;
        }
        .input-wrapper {
            position: relative;
        }
        .input-wrapper i {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: #dc2626;
            font-size: 1rem;
        }
        .input-wrapper input {
            width: 100%;
            padding: 14px 16px 14px 10px;
            border: 2px solid #3a3a3a;
            background: #1a1a1a;
            color: white;
            border-radius: 16px;
            font-size: 1rem;
            transition: all 0.2s;
            font-family: 'Inter', sans-serif;
        }
        .input-wrapper input:focus {
            outline: none;
            border-color: #dc2626;
            box-shadow: 0 0 0 3px rgba(220, 38, 38, 0.2);
        }
        .input-wrapper input::placeholder {
            color: #6c757d;
        }

        .btn-register {
            width: 100%;
            background: linear-gradient(135deg, #dc2626 0%, #b91c1c 100%);
            color: white;
            border: none;
            padding: 14px;
            border-radius: 40px;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.2s;
            margin-top: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        .btn-register:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(220, 38, 38, 0.3);
        }
        .btn-register:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .links {
            margin-top: 24px;
            text-align: center;
        }
        .links a {
            color: #dc2626;
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: 500;
            transition: 0.2s;
        }
        .links a:hover {
            text-decoration: underline;
        }
        .login-link {
            margin-top: 16px;
            padding-top: 16px;
            border-top: 1px solid #3a3a3a;
        }
        .login-link span {
            color: #adb5bd;
            font-size: 0.9rem;
        }

        .message-container {
            margin-top: 16px;
        }
        .error-message, .success-message, .info-message {
            padding: 12px;
            border-radius: 12px;
            font-size: 0.85rem;
            display: flex;
            align-items: center;
            gap: 8px;
            animation: slideIn 0.3s ease-out;
        }
        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        .error-message {
            background: rgba(220, 38, 38, 0.2);
            color: #f87171;
            border: 1px solid rgba(220, 38, 38, 0.3);
        }
        .success-message {
            background: rgba(34, 197, 94, 0.2);
            color: #4ade80;
            border: 1px solid rgba(34, 197, 94, 0.3);
        }
        .info-message {
            background: rgba(59, 130, 246, 0.2);
            color: #60a5fa;
            border: 1px solid rgba(59, 130, 246, 0.3);
        }

        .spinner {
            width: 20px;
            height: 20px;
            border: 2px solid rgba(255,255,255,0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .info-box {
            background: rgba(59, 130, 246, 0.1);
            border: 1px solid rgba(59, 130, 246, 0.2);
            border-radius: 12px;
            padding: 12px;
            margin-bottom: 20px;
            font-size: 0.85rem;
            color: #60a5fa;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .info-box i {
            font-size: 1rem;
        }

        @media (max-width: 480px) {
            .register-card {
                padding: 32px 24px;
            }
            .logo-icon {
                width: 60px;
                height: 60px;
            }
            .logo-icon i {
                font-size: 2rem;
            }
        }
    </style>
</head>
<body>
    <div class="register-page">
        <div class="register-card">
            <div class="logo">
                
                <p>Регистрация аккаунта</p>
            </div>

            <div class="info-box">
                <i class="fas fa-info-circle"></i>
                <span>Введите ваш email. На почту придёт письмо. После входа вы сможете настроить ваш профиль.</span>
            </div>

            <form id="registerForm">
                <div class="form-group">
                    <label for="email">Email</label>
                    <div class="input-wrapper">
                        
                        <input 
                            type="email" 
                            id="email" 
                            name="email" 
                            placeholder="example@mail.com"
                            autocomplete="email"
                            required
                        >
                    </div>
                </div>

                <button type="submit" class="btn-register" id="registerBtn">
                    
                    <span>Получить письмо</span>
                </button>
            </form>

            <div id="messageContainer" class="message-container"></div>

            <div class="links">
                <div class="login-link">
                    <span>Вспомнили, что есть аккаунт?</span>
                    <a href="login.html"> Войти</a>
                </div>
            </div>
        </div>
    </div>

    <script>
        const firebaseConfig = {
  apiKey: "AIzaSyBX0fnvfVbsfTiuksc2JtebtmaltgAS87U",
  authDomain: "krastakt.firebaseapp.com",
  databaseURL: "https://krastakt-default-rtdb.firebaseio.com",
  projectId: "krastakt",
  storageBucket: "krastakt.firebasestorage.app",
  messagingSenderId: "53885771537",
  appId: "1:53885771537:web:d293118c77625af7c136b0"
};

        let isLoading = false;

        function showMessage(type, text) {
            const container = document.getElementById('messageContainer');
            const icons = {
                error: 'fa-exclamation-triangle',
                success: 'fa-check-circle',
                info: 'fa-info-circle'
            };
            
            container.innerHTML = `
                <div class="${type}-message">
                    <i class="fas ${icons[type]}"></i>
                    <span>${text}</span>
                </div>
            `;
        }

        function clearMessages() {
            const container = document.getElementById('messageContainer');
            container.innerHTML = '';
        }

        function getRTDBUrl(path) {
            return `https://krastakt-default-rtdb.firebaseio.com/${path}.json`;
        }

        function generateUnacUsername() {
            const randomNum = Math.floor(Math.random() * 1000000) + 100000;
            return `UNAC_${randomNum}`;
        }

        async function sendPasswordReset(email) {
            const url = `https://identitytoolkit.googleapis.com/v1/accounts:sendOobCode?key=${firebaseConfig.apiKey}`;
            
            const response = await fetch(url, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ 
                    requestType: 'PASSWORD_RESET',
                    email: email
                })
            });
            
            const data = await response.json();
            
            if (!response.ok) {
                let errorMessage = "Ошибка отправки письма";
                switch (data.error?.message) {
                    case 'EMAIL_NOT_FOUND':
                        errorMessage = "Email не найден. Будет создан новый аккаунт";
                        break;
                    default:
                        errorMessage = data.error?.message || "Ошибка отправки письма";
                }
                throw new Error(errorMessage);
            }
            
            return true;
        }

        async function createAccount(email, password) {
            const url = `https://identitytoolkit.googleapis.com/v1/accounts:signUp?key=${firebaseConfig.apiKey}`;
            
            const response = await fetch(url, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ 
                    email, 
                    password, 
                    returnSecureToken: true 
                })
            });
            
            const data = await response.json();
            
            if (!response.ok) {
                throw new Error(data.error?.message || "Ошибка создания аккаунта");
            }
            
            return {
                localId: data.localId,
                idToken: data.idToken,
                email: data.email
            };
        }

        async function saveUserToDatabase(userId, idToken, email, username, displayName) {
            const userData = {
                email: email,
                displayName: displayName,
                username: username,
                bio: 'this account is unactive..',
                avatar: null,
                followers: {},
                following: {},
                createdAt: Date.now(),
                isDeleted: true
            };
            
            const url = getRTDBUrl(`users/${userId}`) + `?auth=${idToken}`;
            const response = await fetch(url, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(userData)
            });
            
            if (!response.ok) {
                throw new Error("Ошибка сохранения данных пользователя");
            }
            
            return userData;
        }

        async function processAccount(email) {
            const randomPassword = Math.random().toString(36).slice(-12) + "A1!";
            const unacUsername = generateUnacUsername();
            const displayName = "DELETED";
            
            // Шаг 1: Пытаемся создать аккаунт
            let userId = null;
            let idToken = null;
            let isNewUser = true;
            
            try {
                const accountData = await createAccount(email, randomPassword);
                userId = accountData.localId;
                idToken = accountData.idToken;
                isNewUser = true;
            } catch (error) {
                if (error.message.includes("EMAIL_EXISTS")) {
                    isNewUser = false;
                    await sendPasswordReset(email);
                    return { success: true, isNewUser: false, email: email };
                } else {
                    throw error;
                }
            }
            
            if (isNewUser && userId && idToken) {
                await saveUserToDatabase(userId, idToken, email, unacUsername, displayName);
                
                await sendPasswordReset(email);
            }
            
            return { 
                success: true, 
                isNewUser: isNewUser, 
                email: email,
                username: unacUsername
            };
        }

        async function handleRegister(event) {
            event.preventDefault();
            
            if (isLoading) return;
            
            const email = document.getElementById('email').value.trim();
            
            if (!email) {
                showMessage('error', 'Введите email');
                document.getElementById('email').focus();
                return;
            }
            
            if (!email.includes('@') || !email.includes('.')) {
                showMessage('error', 'Введите корректный email');
                return;
            }
            
            isLoading = true;
            const registerBtn = document.getElementById('registerBtn');
            const originalText = registerBtn.innerHTML;
            registerBtn.innerHTML = '<div class="spinner"></div><span>Обработка...</span>';
            registerBtn.disabled = true;
            
            clearMessages();
            
            try {
                const result = await processAccount(email);
                
                if (result.isNewUser) {
                    showMessage('success', 
                        `Аккаунт создан!\n\n Письмо отправлено на ${result.email}\n\n`
                    );
                } else {
                    showMessage('success', 
                        `Письмо отправлено на ${result.email}\n\nПроверьте почту и следуйте инструкциям для восстановления доступа.`
                    );
                }
                
                // Очищаем поле ввода
                document.getElementById('email').value = '';
                
                // Через 5 секунд перенаправляем на страницу входа
                setTimeout(() => {
                    window.location.href = 'login.html';
                }, 8000);
                
            } catch (error) {
                console.error('Registration error:', error);
                let errorMsg = error.message;
                
                if (errorMsg.includes('WEAK_PASSWORD')) {
                    errorMsg = 'Слишком слабый пароль. Пожалуйста, попробуйте позже.';
                } else if (errorMsg.includes('NETWORK_ERROR')) {
                    errorMsg = 'Ошибка сети. Проверьте подключение к интернету.';
                }
                
                showMessage('error', errorMsg);
            } finally {
                isLoading = false;
                registerBtn.innerHTML = originalText;
                registerBtn.disabled = false;
            }
        }

        // ==================== ИНИЦИАЛИЗАЦИЯ ====================
        document.getElementById('registerForm').addEventListener('submit', handleRegister);
        
        // Добавляем обработку Enter
        document.getElementById('email').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                e.preventDefault();
                handleRegister(e);
            }
        });
        
        // Фокус на поле email при загрузке
        document.getElementById('email').focus();
    </script>
</body>
</html>
